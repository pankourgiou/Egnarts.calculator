<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ten Plates — A Curio Numeral Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #141318;
    --panel: #1d1c22;
    --frame: #302d35;
    --paper: #ece6d8;
    --paper-dim: #a8a196;
    --gold: #c3a06a;
    --gold-deep: #8f7245;
    --shadow: rgba(0,0,0,0.55);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(circle at 15% 10%, rgba(195,160,106,0.06), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(195,160,106,0.05), transparent 45%),
      var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .app{
    width: 420px;
    max-width: 94vw;
    margin: 24px auto;
    background: var(--panel);
    border: 1px solid var(--frame);
    border-radius: 14px;
    box-shadow: 0 40px 70px -25px var(--shadow), 0 0 0 1px rgba(195,160,106,0.05) inset;
    padding: 24px 20px 20px;
  }

  header{ text-align:center; margin-bottom: 16px; }

  h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 23px;
    letter-spacing: 0.3em;
    margin: 0 0 6px;
    color: var(--paper);
    text-transform: uppercase;
  }

  .rule{
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-deep) 20%, var(--gold-deep) 80%, transparent);
    margin: 8px 0;
    opacity: 0.6;
  }

  .subtitle{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .display-panel{
    background: #0e0d11;
    border: 1px solid var(--frame);
    border-radius: 10px;
    padding: 12px 12px 10px;
    margin-bottom: 16px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
    min-height: 118px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:8px;
  }

  .history-row{
    min-height: 30px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:5px;
    opacity: 0.5;
  }
  .history-row .tile{ width:22px; height:22px; border-radius:3px; }
  .history-row .op-symbol{ font-size: 13px; color: var(--gold); font-weight:500; }

  .current-row{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap: 5px;
    flex-wrap: wrap;
    min-height: 52px;
  }
  .current-row .tile{
    width: 46px; height: 46px;
    border-radius: 6px;
    border: 1.5px solid var(--gold-deep);
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .current-row .punct{
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--paper);
    line-height:1;
  }

  .translit{
    text-align:right;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--paper-dim);
  }
  .translit::before{ content: "no. "; color: var(--gold-deep); }

  .keypad{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  button{
    font-family: 'JetBrains Mono', monospace;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    height: 64px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    transition: transform 0.06s ease, box-shadow 0.15s ease, filter 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  button:active{ transform: translateY(2px) scale(0.98); }

  .key-tile{
    padding: 0;
    border: 1px solid var(--frame);
    box-shadow: 0 2px 6px rgba(0,0,0,0.45);
  }
  .key-tile img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
    filter: saturate(0.92) contrast(1.02);
  }
  .key-tile:hover img{ filter: saturate(1.05) contrast(1.05) brightness(1.05); }
  .key-tile .plate-num{
    position:absolute;
    bottom: 3px; right: 5px;
    font-size: 9.5px;
    letter-spacing: 0.06em;
    color: #f3ead6;
    background: rgba(15,13,10,0.55);
    padding: 1px 5px;
    border-radius: 4px;
    border: 1px solid rgba(195,160,106,0.5);
  }

  .key-fn{
    background: #242229;
    border: 1px solid var(--frame);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .key-fn:hover{ background: #2b2831; }

  .key-op{
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
    color: #1a1710;
    font-size: 21px;
    font-weight: 600;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  }
  .key-op:hover{ filter: brightness(1.06); }

  .key-eq{
    background: linear-gradient(180deg, #3a3641, #201e25);
    color: var(--paper);
    font-size: 19px;
    border: 1px solid var(--frame);
  }

  footer{
    text-align:center;
    margin-top: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    color: var(--paper-dim);
    opacity: 0.7;
  }

  @media (max-width: 380px){
    .app{ padding: 18px 12px 14px; }
    button{ height: 58px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Ten Plates</h1>
    <div class="rule"></div>
    <div class="subtitle">A Curio Numeral Engine</div>
  </header>

  <div class="display-panel">
    <div class="history-row" id="historyRow"></div>
    <div class="current-row" id="currentRow"></div>
    <div class="translit" id="translit">0</div>
  </div>

  <div class="keypad" id="keypad"></div>

  <footer>ten plates, one arithmetic</footer>
</div>

let display = '0';
let pending = null;
let justEvaluated = false;

const currentRow = document.getElementById('currentRow');
const historyRow = document.getElementById('historyRow');
const translit = document.getElementById('translit');
const keypad = document.getElementById('keypad');

function opSymbol(op){ return {'+':'+','-':'\u2212','*':'\u00d7','/':'\u00f7'}[op] || ''; }

function renderNumberInto(container, numStr, big){
  container.innerHTML = '';
  for(const ch of numStr){
    if(ch === '.' || ch === '-'){
      const span = document.createElement('span');
      span.className = big ? 'punct' : 'op-symbol';
      span.textContent = ch === '-' ? '\u2212' : '.';
      container.appendChild(span);
    } else if (TILES[ch]) {
      const img = document.createElement('img');
      img.className = 'tile';
      img.src = TILES[ch];
      img.alt = ch;
      container.appendChild(img);
    }
  }
}

function render(){
  renderNumberInto(currentRow, display, true);
  translit.textContent = display;

  historyRow.innerHTML = '';
  if(pending !== null){
    const numSpan = document.createElement('span');
    numSpan.style.display = 'flex';
    numSpan.style.gap = '3px';
    numSpan.style.alignItems = 'center';
    renderNumberInto(numSpan, String(pending.value), false);
    historyRow.appendChild(numSpan);
    const opSpan = document.createElement('span');
    opSpan.className = 'op-symbol';
    opSpan.textContent = opSymbol(pending.op);
    historyRow.appendChild(opSpan);
  }
}

function inputDigit(d){
  if(justEvaluated){ display = d; justEvaluated = false; }
  else if(display === '0'){ display = d; }
  else {
    if(display.replace('-','').replace('.','').length >= 12) return;
    display += d;
  }
  render();
}

function inputDot(){
  if(justEvaluated){ display = '0.'; justEvaluated = false; render(); return; }
  if(!display.includes('.')) display += '.';
  render();
}

function clearAll(){ display = '0'; pending = null; justEvaluated = false; render(); }

function backspace(){
  if(justEvaluated){ clearAll(); return; }
  if(display.length <= 1 || (display.length === 2 && display.startsWith('-'))) display = '0';
  else display = display.slice(0, -1);
  render();
}

function toggleSign(){
  if(display === '0') return;
  display = display.startsWith('-') ? display.slice(1) : '-' + display;
  render();
}

function percent(){
  const v = parseFloat(display) / 100;
  display = trimNumber(v);
  render();
}

function trimNumber(v){
  if(!isFinite(v)) return 'Error';
  let s = String(Math.round(v * 1e10) / 1e10);
  if(s.length > 14) s = v.toExponential(6);
  return s;
}

function compute(a, b, op){
  switch(op){
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b === 0 ? NaN : a / b;
  }
}

function chooseOperator(op){
  const current = parseFloat(display);
  if(pending !== null && !justEvaluated){
    const result = compute(pending.value, current, pending.op);
    display = trimNumber(result);
    pending = { value: parseFloat(display), op };
  } else {
    pending = { value: current, op };
  }
  justEvaluated = false;
  display = '0';
  render();
}

function equals(){
  if(pending === null) return;
  const current = parseFloat(display);
  const result = compute(pending.value, current, pending.op);
  display = trimNumber(result);
  pending = null;
  justEvaluated = true;
  render();
}

function buildKey(kind, opts){
  const btn = document.createElement('button');
  btn.className = kind;
  if(opts.span2) btn.classList.add('span-2');
  if(opts.html) btn.innerHTML = opts.html;
  else btn.textContent = opts.text || '';
  btn.addEventListener('click', opts.onClick);
  return btn;
}

function tileKey(d){
  return buildKey('key-tile', {
    html: `<img src="${TILES[d]}" alt="${d}"><span class="plate-num">no. ${d}</span>`,
    onClick: () => inputDigit(d)
  });
}

keypad.appendChild(buildKey('key-fn', { text:'C', onClick: clearAll }));
keypad.appendChild(buildKey('key-fn', { text:'\u232b', onClick: backspace }));
keypad.appendChild(buildKey('key-fn', { text:'%', onClick: percent }));
keypad.appendChild(buildKey('key-op', { text:'\u00f7', onClick: () => chooseOperator('/') }));

['7','8','9'].forEach(d => keypad.appendChild(tileKey(d)));
keypad.appendChild(buildKey('key-op', { text:'\u00d7', onClick: () => chooseOperator('*') }));

['4','5','6'].forEach(d => keypad.appendChild(tileKey(d)));
keypad.appendChild(buildKey('key-op', { text:'\u2212', onClick: () => chooseOperator('-') }));

['1','2','3'].forEach(d => keypad.appendChild(tileKey(d)));
keypad.appendChild(buildKey('key-op', { text:'+', onClick: () => chooseOperator('+') }));

keypad.appendChild(buildKey('key-fn', { text:'\u00b1', onClick: toggleSign }));
keypad.appendChild(tileKey('0'));
keypad.appendChild(buildKey('key-fn', { text:'.', onClick: inputDot }));
keypad.appendChild(buildKey('key-eq', { text:'=', onClick: equals }));

window.addEventListener('keydown', (e) => {
  if(e.key >= '0' && e.key <= '9') inputDigit(e.key);
  else if(e.key === '.') inputDot();
  else if(e.key === '+') chooseOperator('+');
  else if(e.key === '-') chooseOperator('-');
  else if(e.key === '*') chooseOperator('*');
  else if(e.key === '/') { e.preventDefault(); chooseOperator('/'); }
  else if(e.key === 'Enter' || e.key === '=') equals();
  else if(e.key === 'Backspace') backspace();
  else if(e.key === 'Escape') clearAll();
});

render();
</script>
